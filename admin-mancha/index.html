<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://kgyhrapfhfkwgejquyjx.supabase.co; script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://kgyhrapfhfkwgejquyjx.supabase.co;">
  <title>Admin Nuvem - Assistente Peixaria Mancha</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#050810] text-white min-h-screen flex items-center justify-center p-6 font-sans">
  
  <div class="fixed inset-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% -20%, #ff5722 0%, transparent 60%); blur(60px);"></div>

  <main class="w-full max-w-2xl bg-white/5 border border-white/10 p-8 rounded-3xl backdrop-blur-xl shadow-2xl relative z-10 fade-up">
    
    <div class="flex items-center gap-4 mb-8">
      <img src="../Fotos/logo.png" alt="Logo Mancha" class="w-16 h-16 rounded-full border-2 border-[#ff5722] object-cover">
      <div>
        <h1 class="text-2xl font-black uppercase tracking-wide" id="panel-title">Acesso Administrativo</h1>
        <p class="text-white/50 text-sm" id="panel-subtitle">Acesso restrito à configuração de Inteligência Artificial.</p>
      </div>
      <button id="logout-btn" class="hidden ml-auto bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm transition-colors border border-white/10">Sair</button>
    </div>

    <!-- TELA 1: LOGIN -->
    <form id="login-form" class="flex flex-col gap-5">
      <div>
        <label class="block text-sm font-bold text-white/70 mb-2 uppercase tracking-wide">E-mail Administrativo</label>
        <input type="email" id="email" required autocomplete="username" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#ff5722] transition-colors">
      </div>
      <div>
        <label class="block text-sm font-bold text-white/70 mb-2 uppercase tracking-wide">Senha</label>
        <input type="password" id="password" required autocomplete="current-password" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#ff5722] transition-colors">
      </div>
      
      <div id="login-error" class="text-red-400 text-sm font-bold hidden" role="alert"></div>      
      <button type="submit" id="btn-login" class="mt-2 bg-[#ff5722] text-white font-bold uppercase tracking-wider text-sm px-6 py-4 rounded-xl hover:bg-[#ff7043] transition-all shadow-[0_4px_15px_rgba(255,87,34,0.4)]">
        Fazer Login
      </button>
      <p class="text-xs text-white/30 text-center mt-2">Acesso restrito. Contate o administrador para obter credenciais.</p>
    </form>

    <!-- TELA 2: CONFIGURAÇÃO NUVEM -->
    <form id="ai-settings-form" class="flex flex-col gap-6 hidden">
      <div>
        <label for="apikey" class="block text-sm font-bold text-white/70 mb-2 uppercase tracking-wide">Chave da LLM API (OpenRouter):</label>
        <input type="password" id="apikey" autocomplete="off"
          class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#ff5722] transition-colors"
          placeholder="sk-or-v1-...">
        <p class="text-xs text-white/40 mt-2 font-medium">A chave é armazenada de forma segura no servidor. Nenhum código do cliente terá acesso direto.</p>
      </div>

      <div>
        <label for="sysprompt" class="block text-sm font-bold text-white/70 mb-2 uppercase tracking-wide">Comportamento (Instruções):</label>
        <textarea id="sysprompt" rows="8"
          class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#ff5722] transition-colors resize-y leading-relaxed"
          placeholder="Você é a assistente da Peixaria..."></textarea>
      </div>

      <button type="submit" id="save-btn" class="mt-4 bg-[#ff5722] hover:bg-[#ff7043] text-white font-bold uppercase tracking-wider text-sm px-6 py-4 rounded-xl transition-all shadow-[0_2px_10px_rgba(255,87,34,0.3)]">
        Salvar Configurações
      </button>
      <div id="status-message" class="text-sm font-bold mt-2 hidden" role="status"></div>
    </form>
    
    <div class="mt-10 pt-4 border-t border-white/10 text-center">
       <p class="text-[10px] text-white/30 uppercase tracking-widest">Peixaria Mancha — Administração &copy; 2026</p>
    </div>

  </main>

  <script src="admin.js"></script>
</body>
</html>
